# Mirrorr — Production infrastructure
#
# Services:
#   postgresql   — Temporal's backing store (Postgres 16)
#   temporal     — Workflow orchestration (Temporal server)
#   app          — Fastify API + frontend static files (port 4001)
#   worker       — Temporal worker  +  yt-dlp + ffmpeg (NVIDIA GPU)
#   gluetun      — WireGuard VPN gateway — yt-dlp routes through its HTTP proxy
#
# temporal-ui is intentionally omitted in prod. Discovery pause/resume is
# managed via the REST API (POST /api/discovery/pause|resume).
#
# Usage:
#   1. cp infra/prod/.env.example infra/prod/.env  (and fill in secrets)
#   2. docker build --target app    -t mirrorr-app:latest .
#      docker build --target worker -t mirrorr-worker:latest .
#   3. docker compose -f infra/prod/compose.yaml up -d
#
# GPU prerequisites (worker):
#   nvidia-container-toolkit must be installed on the Docker host.
#   Verify: docker run --rm --gpus all nvidia/cuda:12-base-ubuntu22.04 nvidia-smi

name: mirrorr

services:

  # ── Temporal backing store ─────────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: mirrorr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Temporal server ────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.29.3
    container_name: mirrorr_temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    # Not exposed to host — app/worker reach it via the internal network
    networks:
      - internal
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Gluetun VPN gateway ────────────────────────────────────────────────────
  # Exposes an HTTP proxy on port 8888 (container-internal).
  # The worker uses YTDLP_PROXY=http://gluetun:8888 so only yt-dlp subprocess
  # traffic is routed through the VPN; Temporal SDK connections stay direct.
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: mirrorr_gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - DNS_ADDRESS=${WIREGUARD_DNS:-1.1.1.1}
      # Expose Gluetun's built-in HTTP proxy so worker can route yt-dlp calls
      - HTTPPROXY=on
      - HTTPPROXY_LOG=off
    networks:
      - internal
    env_file:
      - .env

  # ── API server ─────────────────────────────────────────────────────────────
  # Fastify REST API + serves the built React frontend via @fastify/static.
  # Runs migrations on startup (drizzle-kit migrate) via entrypoint wrapper.
  app:
    image: mirrorr-app:latest
    container_name: mirrorr_app
    restart: unless-stopped
    ports:
      - "4001:4001"  # Put behind Nginx Proxy Manager for SSL termination
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
    env_file:
      - .env
    volumes:
      - data:/data
    networks:
      - internal
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Temporal worker ────────────────────────────────────────────────────────
  # Processes all pipeline activities: discover, download, transcode, upload.
  # yt-dlp subprocesses are routed through Gluetun's HTTP proxy via YTDLP_PROXY.
  # NVIDIA GPU is used by FFmpeg for h264_nvenc hardware transcoding.
  worker:
    image: mirrorr-worker:latest
    container_name: mirrorr_worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      # Route yt-dlp subprocess calls through Gluetun HTTP proxy
      - YTDLP_PROXY=http://gluetun:8888
    env_file:
      - .env
    volumes:
      - data:/data
    networks:
      - internal
    depends_on:
      temporal:
        condition: service_healthy
      gluetun:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # Temporal Postgres state
  data:            # Shared app+worker: SQLite DB, cookies, downloads, transcodes
