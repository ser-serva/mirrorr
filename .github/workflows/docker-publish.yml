# Mirrorr — Docker image build and publish
#
# On push to main or manual dispatch: builds both image targets but does NOT push (CI validation).
# On semver tag push (v*.*.*): builds and pushes to ghcr.io.
#   - Stable tags (vX.Y.Z)       → :X.Y.Z + :X.Y + :X + :latest
#   - Pre-release (vX.Y.Z-beta)  → :X.Y.Z-beta only (never updates :latest)
#
# Images published:
#   ghcr.io/ser-serva/mirrorr-app:{tag}
#   ghcr.io/ser-serva/mirrorr-worker:{tag}
#
# Registry auth: uses GITHUB_TOKEN automatically — no secrets needed.

name: Docker Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+**'   # v1.0.0, v1.0.0-beta.1, etc.
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # IMAGE_OWNER resolves to the GitHub org/user that owns this repo —
  # works under vineethsoma/mirrorr today and ser-serva/mirrorr once transferred.
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ── Build validation (push to main / manual dispatch, never pushes images) ─
  build-test:
    name: Build (no push)
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app target (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: false
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build worker target (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ── Publish app image ──────────────────────────────────────────────────────
  publish-app:
    name: Publish mirrorr-app
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-app
          tags: |
            # vX.Y.Z → X.Y.Z, X.Y, X, latest (stable semver only)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push mirrorr-app
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  # ── Publish worker image ───────────────────────────────────────────────────
  publish-worker:
    name: Publish mirrorr-worker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push mirrorr-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ── Image scan: mirrorr-app ─────────────────────────────────────────────────
  scan-app:
    name: Image scan — mirrorr-app
    runs-on: ubuntu-latest
    needs: publish-app
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Derive image tag
        id: tag
        # github.ref_name is e.g. v1.0.0-beta.16; strip leading 'v' to match
        # the semver tag that docker/metadata-action published (1.0.0-beta.16).
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gate: fails on any unfixed CRITICAL finding in the published image.
      - name: Scan image (table — gate)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-app:${{ steps.tag.outputs.value }}
          scanners: vuln
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # Reporting: SARIF upload to Security tab (best-effort, GHAS required).
      - name: Scan image (SARIF — Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-app:${{ steps.tag.outputs.value }}
          scanners: vuln
          format: sarif
          output: trivy-app.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-app.sarif
        continue-on-error: true

  # ── Image scan: mirrorr-worker ──────────────────────────────────────────────
  scan-worker:
    name: Image scan — mirrorr-worker
    runs-on: ubuntu-latest
    needs: publish-worker
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Derive image tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image (table — gate)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-worker:${{ steps.tag.outputs.value }}
          scanners: vuln
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan image (SARIF — Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/mirrorr-worker:${{ steps.tag.outputs.value }}
          scanners: vuln
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
        continue-on-error: true
