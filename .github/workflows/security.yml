# Mirrorr — Security scanning
#
# Runs on every PR and push to main. Three parallel jobs:
#
#   gitleaks   — scans commit history for accidentally committed secrets
#   audit      — pnpm audit, fails on HIGH or above
#   grype-fs   — Grype filesystem scan of repo for CVEs (node_modules excluded;
#                covered by pnpm audit). Exits 1 on fixed HIGH/CRITICAL, also
#                uploads SARIF to the GitHub Security tab (requires GHAS on
#                private repos; upload step is continue-on-error so it degrades
#                gracefully)
#
# Image-level Grype scans run in docker-publish.yml after each image is pushed.

name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Secret scanning ─────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required to scan all commits in the PR

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency audit ────────────────────────────────────────────────────────
  audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is intentionally omitted — reads from packageManager in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high

  # ── Filesystem CVE scan ─────────────────────────────────────────────────────
  grype-fs:
    name: Filesystem scan (Grype)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Grype — writes to $HOME/bin (no sudo required on GH runners).
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      # Gate: fails the job on any fixed HIGH or above finding.
      # Gitleaks handles secrets; node_modules excluded (covered by pnpm audit).
      - name: Scan (table — PR gate)
        run: |
          grype dir:. \
            --fail-on high \
            --only-fixed \
            --exclude './node_modules/**' \
            -o table

      # Reporting: produce SARIF for the Security tab (never gates the job).
      - name: Scan (SARIF — Security tab)
        if: always()
        run: |
          grype dir:. \
            --only-fixed \
            --exclude './node_modules/**' \
            -o sarif \
            --file grype-fs.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-fs.sarif
        continue-on-error: true  # GitHub Advanced Security required on private repos
